<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MANAGEMENT UMKM</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/material_blue.css">

</head>
<body>
    <style>
        .offcanvas-md{
            --bs-offcanvas-width: 230px;
            height: 100%;
            overflow-y: auto;
        }

        @media(min-width: 760px){
            .offcanvas-md{
                position: static;
                overflow-y: auto;
                display: flex;
                flex-direction: column;
                overflow-x: hidden;
            }

            .text-md-sm{
                font-size: 0.75rem;
            }
        }
    </style>


    <!-- MAIN SAMA DENGAN INDEX -->
    <div class="container-fluid d-flex flex-column p-0 vh-100">  
        <div class="navbar navbar-expand-md bg-dark" data-bs-theme="dark">
            <div class="container-fluid">
                <div class="navbar-brand ms-2">Tokomu</div>
                <div class="d-flex ms-auto">
                    <button class="navbar-toggler" data-bs-target="#sidebar" data-bs-toggle="collapse" type="button">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                </div>
            </div>
        </div>

        <div class="container-fluid p-0 d-flex flex-grow-1 overflow-hidden">
            <div class="offcanvas-md" id="sidebar"> 
                <div id="layout">
                    <script>
                        fetch('sidebar.html').then(response => response.text()).then(data => {document.getElementById('layout').innerHTML = data;
                    

                        const CurrentPage = window.location.pathname.split('/').pop() || 'index.html';
                        const Links = document.querySelectorAll('.nav a');

                        Links.forEach(link =>{
                            if(CurrentPage == 'index.html'){
                                document.querySelector('a[href^="main.html"]').classList.add('active');
                            }else if(CurrentPage == link.getAttribute('href')){
                                link.classList.add('active');
                            }
                        });

                            }); 
                    </script>
                </div>
            </div>
        
            <main class="container-fluid flex-grow-1 py-4 h-100 overflow-y-auto">
                <div class="container-fluid p-0">
                    <div class="row">
                        <div class="col-12 col-md-4">
                            
                            <div class="row">
                                <div class="col-12">
                                    <p class="m-0 border-bottom pb-3 mb-2">
                                        <a href="main.html">Home</a> / Reviews
                                    </p>
                                </div>
                            </div>

                            <div class="row mb-3 g-2">
                                <div class="col-12">
                                    <div class="row g-2">
                                        <div class="col-6">
                                            <label for="date" class="form-label">
                                                Date:
                                            </label>
                                            <input type="date" id="date" class="form-control">
                                        </div>
                                        <div class="col-3 d-flex flex-column justify-content-end">
                                            <button class="btn btn-primary">Apply</button>
                                        </div>
                                        <div class="col-3 d-flex flex-column justify-content-end">
                                            <button class="btn-secondary btn">Reset</button>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="row mb-3 g-2">
                                <div class="col-12">
                                    <div class="row g-2">
                                        <div class="col-6 col-md-12">
                                            <div class="card">
                                                <div class="card-body bg-primary rounded shadow-sm text-light">
                                                    <label for="" class="form-label">Total Reviews</label>
                                                    <h5 class="m-0">218</h5>
                                                </div>
                                            </div>
                                        </div>

                                        <div class="col-6 col-md-12">
                                            <div class="card">
                                                <div class="card-body bg-success rounded shadow-sm text-light">
                                                    <label for="" class="form-label">Average Rating</label>
                                                    <h5 class="m-0">4.7/5.0</h5>
                                                </div>
                                            </div>
                                        </div>

                                        <div class="col-12">
                                            <div class="card">
                                                <div class="card-body bg-warning rounded shadow-sm">
                                                    <label for="" class="form-label">Response Rate (Admin)</label>
                                                    <h5 class="m-0">200 / 218  (95%)</h5>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        

                            
                        </div>
                        <div class="col-12 col-md-4">
                                <div class="card">
                                    <div class="card-header">
                                        <h6 class="m-0">
                                            Centiment Analisys
                                        </h6>
                                    </div>
                                    <div class="card-body">
                                                    <div class="d-flex align-items-center mb-4 pb-3 border-bottom">
                                                        <div class="text-center me-4">
                                                            <h1 class="display-4 fw-bold mb-0">4.8</h1>
                                                            <div class="text-warning mb-1" style="font-size: 0.8rem;">
                                                                <i class="bi bi-star-fill"></i>
                                                                <i class="bi bi-star-fill"></i>
                                                                <i class="bi bi-star-fill"></i>
                                                                <i class="bi bi-star-fill"></i>
                                                                <i class="bi bi-star-half"></i>
                                                            </div>
                                                            <small class="text-muted">1.2k Reviews</small>
                                                        </div>

                                                        <div class="flex-grow-1">
                                                            <div class="d-flex align-items-center mb-1">
                                                                <small class="text-muted me-2" style="width: 10px;">5</small>
                                                                <div class="progress flex-grow-1" style="height: 6px;">
                                                                    <div class="progress-bar bg-success" style="width: 85%"></div>
                                                                </div>
                                                            </div>
                                                            <div class="d-flex align-items-center mb-1">
                                                                <small class="text-muted me-2" style="width: 10px;">4</small>
                                                                <div class="progress flex-grow-1" style="height: 6px;">
                                                                    <div class="progress-bar bg-success" style="width: 10%"></div>
                                                                </div>
                                                            </div>
                                                            <div class="d-flex align-items-center mb-1">
                                                                <small class="text-muted me-2" style="width: 10px;">3</small>
                                                                <div class="progress flex-grow-1" style="height: 6px;">
                                                                    <div class="progress-bar bg-warning" style="width: 3%"></div>
                                                                </div>
                                                            </div>
                                                            <div class="d-flex align-items-center mb-1">
                                                                <small class="text-muted me-2" style="width: 10px;">2</small>
                                                                <div class="progress flex-grow-1" style="height: 6px;">
                                                                    <div class="progress-bar bg-danger" style="width: 1%"></div>
                                                                </div>
                                                            </div>
                                                            <div class="d-flex align-items-center">
                                                                <small class="text-muted me-2" style="width: 10px;">1</small>
                                                                <div class="progress flex-grow-1" style="height: 6px;">
                                                                    <div class="progress-bar bg-danger" style="width: 1%"></div>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </div>

                                                    <div class="mb-4">
                                                        <h6 class="small fw-bold text-uppercase text-muted mb-3">Kata Kunci Populer</h6>
                                                        <div class="d-flex flex-wrap gap-2">
                                                            <span class="badge rounded-pill bg-light text-dark border px-3 py-2">Rasa Enak <span class="text-success ms-1">+124</span></span>
                                                            <span class="badge rounded-pill bg-light text-dark border px-3 py-2">Packing Aman <span class="text-success ms-1">+89</span></span>
                                                            <span class="badge rounded-pill bg-light text-dark border px-3 py-2">Pengiriman Lambat <span class="text-danger ms-1">-12</span></span>
                                                            <span class="badge rounded-pill bg-light text-dark border px-3 py-2">Barista Ramah <span class="text-success ms-1">+45</span></span>
                                                        </div>
                                                    </div>

                                                </div>
                                                <div class="card-footer bg-white py-3 border-0">
                                                    <button class="btn btn-outline-primary btn-sm w-100">Lihat Laporan Detail</button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                    </div>



                </div>
            </main>
    
        </div>
    </div>


    

    


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</body>
</html>
