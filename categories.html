<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MANAGEMENT UMKM</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

</head>
<body>
    <style>
        .offcanvas-md{
            --bs-offcanvas-width: 230px;
            height: 100%;
            overflow-y: auto;
        }

        @media(min-width: 760px){
            .offcanvas-md{
                position: static;
                overflow-y: auto;
                display: flex;
                flex-direction: column;
                overflow-x: hidden;
            }

            .text-md-sm{
                font-size: 0.75rem;
            }
        }
    </style>


    <!-- MAIN SAMA DENGAN INDEX -->
    <div class="container-fluid d-flex flex-column p-0 vh-100">  
        <div class="navbar navbar-expand-md bg-dark" data-bs-theme="dark">
            <div class="container-fluid">
                <div class="navbar-brand ms-2">Tokomu</div>
                <div class="d-flex ms-auto">
                    <button class="navbar-toggler" data-bs-target="#sidebar" data-bs-toggle="collapse" type="button">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                </div>
            </div>
        </div>

        <div class="container-fluid p-0 d-flex flex-grow-1 overflow-hidden">
            <div class="offcanvas-md" id="sidebar"> 
                <div id="layout">
                    <script>
                        fetch('sidebar.html').then(response => response.text()).then(data => {document.getElementById('layout').innerHTML = data;
                    

                        const CurrentPage = window.location.pathname.split('/').pop() || 'index.html';
                        const Links = document.querySelectorAll('.nav a');

                        Links.forEach(link =>{
                            if(CurrentPage == 'index.html'){
                                document.querySelector('a[href^="main.html"]').classList.add('active');
                            }else if(CurrentPage == link.getAttribute('href')){
                                link.classList.add('active');
                            }
                        });

                            }); 
                    </script>
                </div>
            </div>
        
            <main class="container-fluid flex-grow-1 py-4 h-100  overflow-y-auto">
                <div class="container-fluid p-0">
                    <div class="row g-2 d-flex flex-grow-0">
                        <div class="col-12 col-md-3">
                            <div class="row g-2">
                                <div class="col-6 col-md-12">
                                    <div class="card">
                                        <div class="text-light card-body bg-primary rounded">
                                            <label for="" class="form-label">Categories</label>
                                            <h5 class="m-0">11</h5>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-6 col-md-12">
                                    <div class="card">
                                        <div class="card-body bg-warning rouded">
                                            <label for="" class="form-label">Empty Categories</label>
                                            <h5 class="m-0">2</h5>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-12 col-md-3 flex-grow-1">
                            <div class="card h-100">
                                <div class="card-header">
                                    <h6 class="m-0">Most Popular Categories</h6>
                                </div>
                                <div class="card-body">
                                    <div style="position: relative; height:150px;">
                                        <canvas id="popularCategoryChart"></canvas>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-12 col-md-3 flex-grow-1">
                            <div class="card h-100">
                                <div class="card-header">
                                    <h6 class="m-0">Reveue by Categories</h6>
                                </div>
                                <div class="card-body">

                                </div>
                            </div>
                        </div>
                    </div>

                </div>
            </main>
    
        </div>
    </div>
    
    

        
        
    


    

    


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>


    <script>
        // Pastikan library Chart.js sudah ter-load di project kamu
        const ctxPop = document.getElementById('popularCategoryChart').getContext('2d');

        const popularCategoryChart = new Chart(ctxPop, {
            type: 'doughnut',
            data: {
                labels: ['Coffee Beans', 'Dairy', 'Syrup', 'Equipment', 'Snacks'],
                datasets: [{
                    label: 'Total Products',
                    data: [45, 25, 15, 10, 5], // Angka persentase atau jumlah item
                    backgroundColor: [
                        '#0d6efd', // Primary
                        '#6610f2', // Indigo
                        '#0dcaf0', // Info
                        '#ffc107', // Warning
                        '#adb5bd'  // Secondary
                    ],
                    hoverOffset: 15,
                    borderWidth: 3,
                    borderColor: '#ffffff'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: {
                            usePointStyle: true,
                            padding: 20,
                            font: {
                                size: 11
                            }
                        }
                    },
                    tooltip: {
                        backgroundColor: 'rgba(0, 0, 0, 0.8)',
                        padding: 15,
                        callbacks: {
                            label: function(context) {
                                return ` ${context.label}: ${context.raw}% of inventory`;
                            }
                        }
                    }
                },
                cutout: '70%', // Membuat lubang tengah lebih besar agar modern
            }
        });
    </script>
</body>
</html>
